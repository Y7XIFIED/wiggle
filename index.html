<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wiggle</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="hero">
      <nav>
        <div class="logo">
          <a
            href="#"
            class="shuffle-item"
            data-text="THE WIGGLE GROUP"
            data-shuffle-direction="right"
            data-duration="0.35"
            data-shuffle-times="1"
            data-ease="power3.out"
            data-stagger="0.03"
            data-trigger-on-hover="true"
            data-trigger-once="false"
            data-respect-reduced-motion="true"
          >
            <span class="shuffle-text" aria-hidden="true"></span>
          </a>
        </div>
        <div
          class="brand-top-right shuffle-item"
          data-text="Y7XIFIED"
          data-shuffle-direction="right"
          data-duration="0.35"
          data-shuffle-times="1"
          data-ease="power3.out"
          data-stagger="0.03"
          data-trigger-on-hover="true"
          data-trigger-once="false"
          data-respect-reduced-motion="true"
        >
          <span class="shuffle-text" aria-hidden="true"></span>
        </div>
      </nav>

      <div class="header">
        <h1>Wiggle</h1>
      </div>

      <div class="tracker">
        <div class="emoji">
          <div class="emoji-face">
            <div class="eyes">
              <img src="./eye.png" alt="" />
              <img src="./eye.png" alt="" />
            </div>
            <div class="mouth-wrapper">
              <div class="mouth"></div>
            </div>
          </div>
        </div>
      </div>

    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
